<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Smart Note Pro | النسخة الاحترافية المنظمة</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <style>
        /* ===== إصلاح أساسي لمنع التمدد خارج الشاشة ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            overflow-x: hidden !important;
            max-width: 100vw !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        img,
        svg,
        video,
        canvas,
        iframe {
            max-width: 100% !important;
            height: auto !important;
        }
        .no-horizontal-scroll {
            overflow-x: hidden !important;
            max-width: 100% !important;
        }

        /* ===== باقي الأنماط ===== */
        :root {
            --primary: #2563eb;
            --header-bg: rgba(255, 255, 255, 0.75);
            --header-border: rgba(0, 0, 0, 0.04);
        }
        .dark {
            background-color: #0f172a;
            color: #f8fafc;
            --header-bg: rgba(30, 41, 59, 0.8);
            --header-border: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Tajawal', sans-serif;
            transition: background 0.3s;
        }
        .glass-header {
            background: var(--header-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--header-border);
        }
        .sidebar {
            height: calc(100vh - 70px);
            transition: all 0.3s ease;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .note-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            word-break: break-word;
            overflow: hidden;
        }
        .note-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }
        .dark .bg-white {
            background-color: #1e293b;
            color: #f1f5f9;
        }
        .editor-input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
        }
        .editor-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        .editor-content {
            font-size: 1.15rem;
            line-height: 1.8;
            min-height: 300px;
            resize: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: bold;
            display: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toast-success {
            background: #10b981;
            color: white;
        }
        .toast-error {
            background: #ef4444;
            color: white;
        }
        .toast-info {
            background: #3b82f6;
            color: white;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== سايدبار متجاوب ===== */
        @media (max-width: 1024px) {
            .sidebar-mobile-active {
                transform: translateX(0) !important;
                display: flex !important;
                position: fixed !important;
                right: 0 !important;
                top: 70px !important;
                z-index: 40 !important;
                width: 280px !important;
                max-width: 85vw !important;
                height: calc(100vh - 70px) !important;
                box-shadow: -8px 0 30px rgba(0, 0, 0, 0.15) !important;
                border-radius: 0 0 0 2rem !important;
            }
            .sidebar-hidden {
                transform: translateX(100%) !important;
                display: none !important;
            }
        }

        /* ===== تجاوب النصوص والعناصر ===== */
        @media (max-width: 480px) {
            .editor-title {
                font-size: 1.5rem !important;
            }
            .editor-content {
                font-size: 1rem !important;
                min-height: 200px !important;
            }
            #editorModal>div {
                border-radius: 0 !important;
            }
            .toast {
                white-space: normal;
                max-width: 92vw;
                font-size: 0.9rem;
                padding: 10px 18px;
                bottom: 16px;
            }
        }

        /* ===== هيدر أنيق ومتناسق ===== */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            height: 70px;
            padding: 0 1.25rem;
            flex-wrap: nowrap;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
            min-width: 0;
        }
        .header-center {
            flex: 1 1 auto;
            min-width: 0;
            max-width: 420px;
            margin: 0 0.75rem;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }
        /* أزرار موحدة */
        .header-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.2s ease;
            background: transparent;
            color: #475569;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
        }
        .dark .header-btn {
            color: #cbd5e1;
        }
        .header-btn:hover {
            background: rgba(37, 99, 235, 0.08);
            color: var(--primary);
            transform: scale(1.02);
        }
        .header-btn:active {
            transform: scale(0.94);
        }
        .header-btn.active {
            background: rgba(37, 99, 235, 0.12);
            color: var(--primary);
        }
        /* زر الإعدادات مميز */
        .header-btn.settings {
            background: rgba(37, 99, 235, 0.06);
            color: var(--primary);
        }
        .header-btn.settings:hover {
            background: rgba(37, 99, 235, 0.15);
        }
        /* شارة الحالة */
        .status-badge {
            font-size: 0.6rem;
            padding: 0.2rem 0.7rem;
            border-radius: 100px;
            font-weight: 600;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #dcfce7;
            color: #15803d;
            white-space: nowrap;
            margin-right: 0.2rem;
        }
        .dark .status-badge {
            background: #064e3b;
            color: #86efac;
        }
        .status-badge.off {
            background: #fef3c7;
            color: #b45309;
        }
        .dark .status-badge.off {
            background: #78350f;
            color: #fcd34d;
        }

        /* شريط البحث */
        .search-wrapper {
            position: relative;
            width: 100%;
        }
        .search-wrapper i {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.9rem;
            pointer-events: none;
        }
        .search-wrapper input {
            width: 100%;
            padding: 0.5rem 2.2rem 0.5rem 0.8rem;
            border-radius: 100px;
            border: none;
            background: #f1f5f9;
            color: #1e293b;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        .dark .search-wrapper input {
            background: #1e293b;
            color: #f1f5f9;
        }
        .search-wrapper input:focus {
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        .dark .search-wrapper input:focus {
            background: #0f172a;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
        }
        .search-wrapper input::placeholder {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        /* الشعار */
        .brand-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.25);
        }
        .brand-text {
            font-weight: 700;
            font-size: 1.1rem;
            color: #0f172a;
            letter-spacing: -0.02em;
        }
        .dark .brand-text {
            color: #f1f5f9;
        }
        .brand-text span {
            color: var(--primary);
            font-weight: 300;
            font-size: 0.7rem;
            margin-right: 0.1rem;
        }

        /* ===== استجابة الهيدر ===== */
        @media (max-width: 768px) {
            .header-container {
                padding: 0 0.75rem;
                gap: 0.3rem;
            }
            .header-btn {
                width: 34px;
                height: 34px;
                font-size: 0.95rem;
                border-radius: 10px;
            }
            .brand-text {
                font-size: 0.95rem;
            }
            .brand-text span {
                display: none;
            }
            .brand-logo {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            .status-badge {
                font-size: 0.5rem;
                padding: 0.15rem 0.5rem;
                gap: 0.15rem;
            }
            .header-center {
                max-width: 180px;
                margin: 0 0.3rem;
            }
            .search-wrapper input {
                font-size: 0.75rem;
                padding: 0.4rem 1.8rem 0.4rem 0.6rem;
            }
            .search-wrapper i {
                font-size: 0.7rem;
                right: 0.6rem;
            }
        }
        @media (max-width: 480px) {
            .header-center {
                max-width: 120px;
            }
            .header-btn {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
                border-radius: 8px;
            }
            .brand-logo {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
            .brand-text {
                font-size: 0.8rem;
            }
            .status-badge {
                display: none;
            }
            .header-container {
                padding: 0 0.4rem;
            }
        }
        @media (max-width: 380px) {
            .header-center {
                max-width: 80px;
            }
            .header-btn {
                width: 26px;
                height: 26px;
                font-size: 0.7rem;
            }
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .truncate-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .break-words {
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .main-content {
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            max-width: 100%;
        }
        .main-inner {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        #notesGrid {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        #notesGrid>* {
            min-width: 0;
            max-width: 100%;
        }
        #editorModal {
            overflow: hidden !important;
        }
        #editorModal>div {
            max-width: 100vw !important;
            max-height: 100vh !important;
            overflow: hidden !important;
        }
        .custom-scrollbar {
            overflow-y: auto;
            overflow-x: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:text-slate-200 no-horizontal-scroll">

    <div id="toast" class="toast"></div>

    <!-- ===== HEADER المُعاد تصميمه ===== -->
    <header class="glass-header sticky top-0 z-50">
        <div class="header-container">
            <!-- القسم الأيسر: القائمة + الشعار -->
            <div class="header-left">
                <button onclick="toggleSidebar()" class="header-btn lg:hidden" aria-label="القائمة">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="brand-logo">
                    <i class="fas fa-brain"></i>
                </div>
                <span class="brand-text">Smart<span>PRO</span></span>
            </div>

            <!-- القسم الأوسط: شريط البحث -->
            <div class="header-center">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" oninput="searchNotes()" placeholder="ابحث في أفكارك..." />
                </div>
            </div>

            <!-- القسم الأيمن: الأزرار -->
            <div class="header-right">
                <button onclick="toggleDarkMode()" class="header-btn" aria-label="الوضع الليلي">
                    <i class="fas fa-moon dark:fa-sun"></i>
                </button>
                <button onclick="exportData()" class="header-btn hidden sm:flex" aria-label="تصدير البيانات">
                    <i class="fas fa-cloud-download-alt"></i>
                </button>
                <button onclick="openSettings()" class="header-btn settings" aria-label="الإعدادات">
                    <i class="fas fa-cog"></i>
                </button>
                <span id="connectionStatus" class="status-badge">
                    <i class="fas fa-circle" style="font-size: 0.35rem;"></i> آمن
                </span>
            </div>
        </div>
    </header>

    <!-- ===== MAIN LAYOUT ===== -->
    <div class="flex w-full max-w-full overflow-hidden">

        <!-- ===== SIDEBAR ===== -->
        <aside id="sidebar"
        class="w-64 sidebar bg-white dark:bg-slate-900 border-l dark:border-slate-800 p-4 hidden lg:flex flex-col sidebar-hidden flex-shrink-0">
        <button onclick="createNewFolder()" class="flex items-center justify-center gap-2 w-full p-3.5 mb-6 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200 dark:shadow-none">
            <i class="fas fa-plus-circle"></i>
            <span>مجلد جديد</span>
        </button>

        <div class="px-2 mb-4"><span class="text-[11px] font-black uppercase tracking-widest text-slate-400">مجلداتك</span></div>
        <div id="folderList" class="space-y-1.5 overflow-y-auto flex-1">
            <!-- تُملأ ديناميكياً -->
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="flex-1 h-[calc(100vh-70px)] main-content p-4 md:p-6 lg:p-10 min-w-0">
        <div class="main-inner max-w-6xl mx-auto">

            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                <div class="min-w-0">
                    <h2 id="currentFolderName" class="text-2xl md:text-4xl font-black text-slate-900 dark:text-white truncate">الملاحظات العامة</h2>
                    <div id="stats" class="inline-flex items-center gap-2 px-3 py-1 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-full text-xs font-bold mt-2"></div>
                </div>
                <button onclick="createNewNote()" class="group bg-slate-900 dark:bg-blue-600 text-white px-6 md:px-8 py-3 md:py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition-all flex items-center gap-3 whitespace-nowrap flex-shrink-0 text-sm md:text-base">
                    <i class="fas fa-feather-alt group-hover:rotate-12 transition"></i>
                    <span class="hidden xs:inline">كتابة ملاحظة جديدة</span>
                    <span class="xs:hidden">جديد</span>
                </button>
            </div>

            <div id="notesGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6 w-full max-w-full">
                <!-- تُملأ ديناميكياً -->
            </div>

        </div>
    </main>
</div>

<!-- ===== MODAL: المحرر الاحترافي ===== -->
<div id="editorModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl hidden z-[60] flex items-center justify-center p-0 md:p-4 overflow-hidden">
    <div class="bg-white dark:bg-slate-900 w-full max-w-5xl md:rounded-[2rem] shadow-2xl flex flex-col h-full md:h-[90vh] overflow-hidden max-h-screen">

        <!-- رأس المحرر -->
        <div class="px-4 md:px-6 py-3 md:py-4 border-b dark:border-slate-800 flex flex-wrap items-center justify-between gap-2 bg-slate-50/50 dark:bg-slate-800/50 flex-shrink-0">
            <div class="flex items-center gap-3 min-w-0">
                <span class="text-[10px] md:text-xs font-bold text-slate-400 hidden sm:inline">حفظ في:</span>
                <select id="editorFolderSelect" class="bg-white dark:bg-slate-700 border-none rounded-lg text-xs font-bold px-3 py-1.5 outline-none ring-1 ring-slate-200 dark:ring-slate-600 focus:ring-blue-500 max-w-[140px] md:max-w-[200px] truncate">
                    <!-- خيارات ديناميكية -->
                </select>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <span id="wordCount" class="text-[10px] font-bold text-slate-400 hidden sm:block">0 كلمة</span>
                <button onclick="closeModal('editorModal')" class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-full hover:bg-red-50 hover:text-red-500 transition">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
        </div>

        <!-- منطقة الكتابة -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8 lg:p-16 custom-scrollbar">
            <input id="editTitle" type="text" placeholder="عنوان الملاحظة الراقية..." class="editor-input editor-title dark:text-white" />
            <textarea id="editContent" oninput="updateEditorStats()" placeholder="ابدأ رحلة الإبداع هنا..." class="editor-input editor-content dark:text-slate-300"></textarea>
        </div>

        <!-- شريط الأدوات -->
        <div class="p-3 md:p-6 bg-white dark:bg-slate-900 border-t dark:border-slate-800 flex flex-col md:flex-row gap-3 md:gap-4 items-center justify-between flex-shrink-0">
            <div class="flex flex-wrap justify-center gap-1.5 md:gap-2">
                <button onclick="aiProcess('summarize')" class="bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 px-3 md:px-5 py-2 md:py-2.5 rounded-xl text-[10px] md:text-xs font-black hover:bg-indigo-100 transition flex items-center gap-1.5">
                    <i class="fas fa-align-right"></i> <span class="hidden xs:inline">تلخيص ذكي</span><span class="xs:hidden">تلخيص</span>
                </button>
                <button onclick="aiProcess('improve')" class="bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 px-3 md:px-5 py-2 md:py-2.5 rounded-xl text-[10px] md:text-xs font-black hover:bg-emerald-100 transition flex items-center gap-1.5">
                    <i class="fas fa-magic"></i> <span class="hidden xs:inline">تحسين النص</span><span class="xs:hidden">تحسين</span>
                </button>
                <button onclick="aiProcess('translate')" class="bg-amber-50 dark:bg-amber-900/20 text-amber-600 px-3 md:px-5 py-2 md:py-2.5 rounded-xl text-[10px] md:text-xs font-black hover:bg-amber-100 transition flex items-center gap-1.5">
                    <i class="fas fa-language"></i> <span class="hidden xs:inline">ترجمة فورية</span><span class="xs:hidden">ترجمة</span>
                </button>
            </div>
            <button onclick="saveNote()" class="w-full md:w-auto bg-blue-600 text-white px-6 md:px-12 py-2.5 md:py-3.5 rounded-2xl font-black shadow-lg shadow-blue-200 dark:shadow-none hover:bg-blue-700 hover:scale-105 transition-all text-sm md:text-base">
                حفظ الملاحظة
            </button>
        </div>
    </div>
</div>

<!-- ===== MODAL: الإعدادات ===== -->
<div id="settingsModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md hidden z-[70] flex items-center justify-center p-4 overflow-y-auto">
    <div class="bg-white dark:bg-slate-800 w-full max-w-md rounded-[2.5rem] p-6 md:p-8 shadow-2xl my-4">
        <div class="w-14 h-14 md:w-16 md:h-16 bg-blue-50 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center text-blue-600 mb-4 md:mb-6 mx-auto text-xl md:text-2xl">
            <i class="fas fa-key"></i>
        </div>
        <h3 class="text-xl md:text-2xl font-black text-center mb-2">إعدادات المحرّك</h3>
        <p class="text-slate-400 text-center text-sm mb-6 md:mb-8">أدخل مفتاح Gemini API وسيتم تشفيره وحفظه محلياً</p>

        <div class="space-y-4">
            <input id="apiKeyInput" type="password" placeholder="AI Key: AIzaSy..."
            class="w-full p-3 md:p-4 bg-slate-50 dark:bg-slate-900 border-none rounded-2xl outline-none ring-2 ring-transparent focus:ring-blue-500 transition font-mono text-sm" />
            <p id="keyStatus" class="text-xs text-slate-400 text-center"></p>

            <div class="flex flex-col sm:flex-row gap-3 pt-2">
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-3 md:py-4 rounded-2xl font-bold hover:bg-blue-700 transition">حفظ المفتاح</button>
                <button onclick="testApiKey()" class="flex-1 bg-emerald-50 text-emerald-600 py-3 md:py-4 rounded-2xl font-bold hover:bg-emerald-100 transition">اختبار</button>
            </div>
            <div class="flex flex-col sm:flex-row gap-3">
                <button onclick="closeModal('settingsModal')" class="flex-1 bg-slate-100 dark:bg-slate-700 py-3 md:py-4 rounded-2xl font-bold">إغلاق</button>
                <button onclick="clearApiKey()" class="flex-1 bg-red-50 text-red-600 py-3 md:py-4 rounded-2xl font-bold hover:bg-red-100 transition">حذف المفتاح</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== AI LOADER ===== -->
<div id="aiLoader" class="fixed inset-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md hidden z-[100] flex flex-col items-center justify-center">
    <div class="loading-spinner"></div>
    <p class="mt-6 font-black text-blue-600 animate-pulse tracking-widest uppercase text-sm text-center px-4">الذكاء الاصطناعي يحلل أفكارك...</p>
</div>

<script>
    // ============================================================
    //  التشفير
    // ============================================================
    const SECRET_KEY = 'smart-note-secret-2026';

    function encryptData(text) {
        return CryptoJS.AES.encrypt(text, SECRET_KEY).toString();
    }

    function decryptData(encrypted) {
        try {
            const bytes = CryptoJS.AES.decrypt(encrypted, SECRET_KEY);
            return bytes.toString(CryptoJS.enc.Utf8);
        } catch (_) { return null; }
    }

    // ============================================================
    //  تنقية النصوص (منع XSS)
    // ============================================================
    function sanitizeText(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function validateInput(text, maxLength = 100) {
        if (!text) return null;
        const trimmed = text.trim();
        if (trimmed.length === 0 || trimmed.length > maxLength) return null;
        const dangerous = /[<>{}[\]\\;'"`]/g;
        if (dangerous.test(trimmed)) return null;
        return trimmed;
    }

    // ============================================================
    //  Toast
    // ============================================================
    function showToast(message, type = 'info', duration = 3000) {
        const toast = document.getElementById('toast');
        toast.className = 'toast toast-' + type;
        toast.textContent = message;
        toast.style.display = 'block';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, duration);
    }

    // ============================================================
    //  الحالة الأساسية
    // ============================================================
    let state = JSON.parse(localStorage.getItem('smart_note_pro_v3')) || {
        folders: [{ id: 'root', name: 'الملاحظات العامة', notes: [] }],
        activeFolderId: 'root',
        darkMode: false,
        encryptedApiKey: ''
    };
    let currentNoteId = null;

    // ============================================================
    //  التهيئة
    // ============================================================
    function init() {
        if (state.darkMode) document.body.classList.add('dark');
        renderFolders();
        renderNotes();
        updateEditorFolderSelect();
        updateConnectionStatus();
        if (state.encryptedApiKey) {
            const el = document.getElementById('keyStatus');
            el.textContent = '✅ المفتاح محفوظ ومشفر';
            el.className = 'text-xs text-emerald-600 text-center';
        }
    }

    function saveToStore() {
        localStorage.setItem('smart_note_pro_v3', JSON.stringify(state));
        updateConnectionStatus();
    }

    function updateConnectionStatus() {
        const status = document.getElementById('connectionStatus');
        if (state.encryptedApiKey) {
            status.className = 'status-badge';
            status.innerHTML = '<i class="fas fa-circle" style="font-size:0.35rem;"></i> آمن';
        } else {
            status.className = 'status-badge off';
            status.innerHTML = '<i class="fas fa-circle" style="font-size:0.35rem;"></i> غير مشفر';
        }
    }

    // ============================================================
    //  السايدبار
    // ============================================================
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('sidebar-mobile-active');
        sidebar.classList.toggle('sidebar-hidden');
    }

    // ============================================================
    //  المجلدات
    // ============================================================
    function renderFolders() {
        const list = document.getElementById('folderList');
        list.innerHTML = '';
        state.folders.forEach(f => {
            const isActive = f.id === state.activeFolderId;
            const safeName = sanitizeText(f.name);
            list.innerHTML += `
                    <div onclick="switchFolder('${f.id}')" class="group flex items-center justify-between p-3.5 rounded-2xl cursor-pointer transition-all ${isActive ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 dark:shadow-none' : 'hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500'}">
                        <div class="flex items-center gap-3 overflow-hidden min-w-0">
                            <i class="fas ${isActive ? 'fa-folder-open' : 'fa-folder'} text-sm flex-shrink-0"></i>
                            <span class="text-sm font-bold truncate">${safeName}</span>
                            <span class="text-[10px] opacity-60 flex-shrink-0">(${f.notes.length})</span>
                        </div>
                        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                            <i onclick="renameFolder(event, '${f.id}')" class="fas fa-edit text-[10px] hover:text-yellow-400 cursor-pointer"></i>
                            ${f.id !== 'root' ? `<i onclick="deleteFolder(event, '${f.id}')" class="fas fa-trash-alt text-[10px] hover:text-red-400 cursor-pointer"></i>` : ''}
                        </div>
                    </div>
                `;
        });
        updateEditorFolderSelect();
    }

    function updateEditorFolderSelect() {
        const select = document.getElementById('editorFolderSelect');
        if (!select) return;
        select.innerHTML = state.folders.map(f =>
            `<option value="${f.id}" ${f.id === state.activeFolderId ? 'selected' : ''}>${sanitizeText(f.name)}</option>`
        ).join('');
    }

    function switchFolder(id) {
        state.activeFolderId = id;
        const folder = state.folders.find(f => f.id === id);
        document.getElementById('currentFolderName').innerText = folder ? folder.name : 'الملاحظات العامة';
        saveToStore();
        renderFolders();
        renderNotes();
        if (window.innerWidth < 1024) toggleSidebar();
    }

    function createNewFolder() {
        const name = prompt("اسم المجلد الجديد:");
        const validated = validateInput(name, 50);
        if (validated) {
            const newId = 'f-' + Date.now();
            state.folders.push({ id: newId, name: validated, notes: [] });
            saveToStore();
            renderFolders();
            showToast('✅ تم إنشاء المجلد', 'success');
        } else if (name !== null) {
            showToast('⚠️ اسم غير صالح', 'error');
        }
    }

    function renameFolder(e, id) {
        e.stopPropagation();
        const folder = state.folders.find(f => f.id === id);
        if (!folder) return;
        const newName = prompt("تعديل اسم المجلد:", folder.name);
        const validated = validateInput(newName, 50);
        if (validated) {
            folder.name = validated;
            if (state.activeFolderId === id) document.getElementById('currentFolderName').innerText = folder.name;
            saveToStore();
            renderFolders();
            showToast('✅ تم التعديل', 'success');
        } else if (newName !== null) {
            showToast('⚠️ اسم غير صالح', 'error');
        }
    }

    function deleteFolder(e, id) {
        e.stopPropagation();
        if (confirm('سيتم حذف المجلد ومحتوياته بالكامل؟')) {
            state.folders = state.folders.filter(f => f.id !== id);
            if (state.activeFolderId === id) state.activeFolderId = 'root';
            saveToStore();
            renderFolders();
            renderNotes();
            showToast('🗑️ تم الحذف', 'info');
        }
    }

    // ============================================================
    //  الملاحظات
    // ============================================================
    function renderNotes(filterText = "") {
        const grid = document.getElementById('notesGrid');
        const folder = state.folders.find(f => f.id === state.activeFolderId);
        if (!folder) return;

        grid.innerHTML = '';
        const safeFilter = filterText ? sanitizeText(filterText) : '';

        const filteredNotes = folder.notes.filter(n =>
            n.title.toLowerCase().includes(safeFilter.toLowerCase()) ||
            n.content.toLowerCase().includes(safeFilter.toLowerCase())
        );
        document.getElementById('stats').innerText = `${filteredNotes.length} ملاحظة محفوظة`;

        if (filteredNotes.length === 0) {
            grid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <i class="fas fa-inbox text-6xl text-slate-300 dark:text-slate-600 mb-4"></i>
                        <p class="text-slate-400">لا توجد ملاحظات${safeFilter ? ' مطابقة للبحث' : ''}</p>
                    </div>
                `;
            return;
        }

        filteredNotes.forEach(note => {
            const safeTitle = sanitizeText(note.title);
            const safeContent = sanitizeText(note.content || 'لا يوجد محتوى بعد...');
            grid.innerHTML += `
                    <div onclick="editNote('${note.id}')" class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm note-card cursor-pointer relative group border border-slate-100 dark:border-slate-700">
                        <div class="h-2 w-12 bg-blue-100 dark:bg-blue-900/30 rounded-full mb-4"></div>
                        <h3 class="font-black text-xl mb-3 line-clamp-2 leading-snug">${safeTitle}</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-sm line-clamp-3 leading-relaxed mb-6">${safeContent}</p>
                        <div class="flex justify-between items-center pt-4 border-t dark:border-slate-700/50">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${sanitizeText(note.date)}</span>
                            <button onclick="deleteNote(event, '${note.id}')" class="w-8 h-8 flex items-center justify-center rounded-full bg-red-50 dark:bg-red-900/20 text-red-500 opacity-0 group-hover:opacity-100 transition-all hover:bg-red-500 hover:text-white">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
        });
    }

    function updateEditorStats() {
        const text = document.getElementById('editContent').value;
        const count = text.trim() ? text.trim().split(/\s+/).length : 0;
        document.getElementById('wordCount').innerText = `${count} كلمة`;
    }

    function createNewNote() {
        currentNoteId = null;
        document.getElementById('editTitle').value = '';
        document.getElementById('editContent').value = '';
        document.getElementById('editorFolderSelect').value = state.activeFolderId;
        updateEditorStats();
        document.getElementById('editorModal').classList.remove('hidden');
    }

    function editNote(id) {
        const folder = state.folders.find(f => f.id === state.activeFolderId);
        if (!folder) return;
        const note = folder.notes.find(n => n.id === id);
        if (!note) return;
        currentNoteId = id;
        document.getElementById('editTitle').value = note.title;
        document.getElementById('editContent').value = note.content;
        document.getElementById('editorFolderSelect').value = state.activeFolderId;
        updateEditorStats();
        document.getElementById('editorModal').classList.remove('hidden');
    }

    function saveNote() {
        let title = document.getElementById('editTitle').value || 'ملاحظة بدون عنوان';
        const content = document.getElementById('editContent').value;
        const targetFolderId = document.getElementById('editorFolderSelect').value;

        title = validateInput(title, 100) || 'ملاحظة بدون عنوان';

        if (currentNoteId) {
            const oldFolder = state.folders.find(f => f.id === state.activeFolderId);
            if (!oldFolder) return;
            const noteIndex = oldFolder.notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex === -1) return;
            const noteData = oldFolder.notes[noteIndex];

            noteData.title = title;
            noteData.content = content;

            if (targetFolderId !== state.activeFolderId) {
                oldFolder.notes.splice(noteIndex, 1);
                const targetFolder = state.folders.find(f => f.id === targetFolderId);
                if (targetFolder) targetFolder.notes.unshift(noteData);
            }
        } else {
            const targetFolder = state.folders.find(f => f.id === targetFolderId);
            if (!targetFolder) return;
            targetFolder.notes.unshift({
                id: 'n-' + Date.now(),
                title: title,
                content: content,
                date: new Date().toLocaleDateString('ar-EG')
            });
        }

        saveToStore();
        closeModal('editorModal');
        renderNotes();
        showToast('✅ تم حفظ الملاحظة', 'success');
    }

    function deleteNote(e, id) {
        e.stopPropagation();
        if (confirm('حذف هذه الملاحظة نهائياً؟')) {
            const folder = state.folders.find(f => f.id === state.activeFolderId);
            if (!folder) return;
            folder.notes = folder.notes.filter(n => n.id !== id);
            saveToStore();
            renderNotes();
            showToast('🗑️ تم الحذف', 'info');
        }
    }

    function searchNotes() {
        const txt = document.getElementById('searchInput').value;
        renderNotes(txt);
    }

    // ============================================================
    //  الذكاء الاصطناعي
    // ============================================================
    function getApiKey() {
        if (!state.encryptedApiKey) {
            showToast('⚠️ الرجاء إدخال مفتاح API في الإعدادات', 'error');
            openSettings();
            return null;
        }
        const decrypted = decryptData(state.encryptedApiKey);
        if (!decrypted) {
            showToast('⚠️ خطأ في فك التشفير', 'error');
            return null;
        }
        return decrypted;
    }

    async function aiProcess(type) {
        const apiKey = getApiKey();
        if (!apiKey) return;

        const content = document.getElementById('editContent').value;
        if (!content) {
            showToast('⚠️ الرجاء كتابة محتوى أولاً', 'error');
            return;
        }

        document.getElementById('aiLoader').classList.remove('hidden');

        let promptText = "";
        let actionLabel = "";
        if (type === 'summarize') {
            promptText = "قم بتلخيص هذا النص بشكل نقاط مركزة واحترافية بالعربية:";
            actionLabel = "التلخيص";
        }
        if (type === 'improve') {
            promptText = "أعد صياغة هذا النص بأسلوب أدبي بليغ ومنظم مع الحفاظ على المعنى:";
            actionLabel = "التحسين";
        }
        if (type === 'translate') {
            promptText = "ترجم النص التالي إلى العربية الفصحى بدقة:";
            actionLabel = "الترجمة";
        }

        try {
            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText + "\n\n" + content }] }]
                    })
                }
            );

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'فشل الاتصال');
            }

            const data = await response.json();
            const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

            if (!aiText) {
                showToast('⚠️ لم يتم الحصول على رد', 'error');
                return;
            }

            if (confirm(`✅ تم ${actionLabel} بنجاح!\n\nهل تريد اعتماد النص المقترح؟`)) {
                document.getElementById('editContent').value = aiText;
                updateEditorStats();
                showToast('✅ تم تطبيق النص الجديد', 'success');
            }

        } catch (error) {
            console.error('AI Error:', error);
            showToast(`⚠️ فشل ${actionLabel}: ${error.message}`, 'error');
        } finally {
            document.getElementById('aiLoader').classList.add('hidden');
        }
    }

    // ============================================================
    //  الإعدادات
    // ============================================================
    function saveSettings() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (!key || key.length < 10) {
            showToast('⚠️ مفتاح غير صالح', 'error');
            return;
        }

        state.encryptedApiKey = encryptData(key);
        saveToStore();
        document.getElementById('keyStatus').textContent = '✅ تم حفظ المفتاح وتشفيره';
        document.getElementById('keyStatus').className = 'text-xs text-emerald-600 text-center';
        closeModal('settingsModal');
        showToast('✅ تم حفظ المفتاح المشفر', 'success');
        updateConnectionStatus();
    }

    async function testApiKey() {
        const keyInput = document.getElementById('apiKeyInput').value.trim();
        const keyToTest = keyInput || decryptData(state.encryptedApiKey);

        if (!keyToTest) {
            showToast('⚠️ الرجاء إدخال مفتاح أولاً', 'error');
            return;
        }

        document.getElementById('aiLoader').classList.remove('hidden');

        try {
            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models?key=${keyToTest}`,
                { method: 'GET' }
            );

            if (response.ok) {
                document.getElementById('keyStatus').textContent = '✅ المفتاح صحيح ويعمل';
                document.getElementById('keyStatus').className = 'text-xs text-emerald-600 text-center';
                showToast('✅ المفتاح صحيح!', 'success');
            } else {
                document.getElementById('keyStatus').textContent = '❌ المفتاح غير صالح';
                document.getElementById('keyStatus').className = 'text-xs text-red-600 text-center';
                showToast('❌ المفتاح غير صالح', 'error');
            }
        } catch (error) {
            showToast('⚠️ فشل الاتصال للتحقق', 'error');
        } finally {
            document.getElementById('aiLoader').classList.add('hidden');
        }
    }

    function clearApiKey() {
        if (confirm('هل تريد حذف المفتاح المشفر؟')) {
            state.encryptedApiKey = '';
            saveToStore();
            document.getElementById('apiKeyInput').value = '';
            document.getElementById('keyStatus').textContent = '🗑️ تم حذف المفتاح';
            document.getElementById('keyStatus').className = 'text-xs text-slate-400 text-center';
            showToast('🗑️ تم حذف المفتاح', 'info');
            updateConnectionStatus();
            closeModal('settingsModal');
        }
    }

    // ============================================================
    //  عام
    // ============================================================
    function toggleDarkMode() {
        state.darkMode = !state.darkMode;
        document.body.classList.toggle('dark');
        saveToStore();
    }

    function exportData() {
        const dataToExport = {
            folders: state.folders,
            exportedAt: new Date().toISOString(),
            version: '3.0.0'
        };
        const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `smart_notes_backup_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        showToast('📥 تم تصدير البيانات', 'success');
    }

    function openSettings() {
        document.getElementById('settingsModal').classList.remove('hidden');
        if (state.encryptedApiKey) {
            document.getElementById('apiKeyInput').value = '';
            document.getElementById('apiKeyInput').placeholder = '🔒 مفتاح مشفر (للتعديل اكتب جديداً)';
        }
    }

    function closeModal(id) {
        document.getElementById(id).classList.add('hidden');
    }

    // ============================================================
    //  بدء التشغيل
    // ============================================================
    init();
    console.log('🚀 Smart Note Pro v3.0 - جميع البيانات مشفرة محلياً');
    console.log('🔒 المفتاح ' + (state.encryptedApiKey ? 'محفوظ ✓' : 'غير موجود'));
    console.log('📝 عدد المجلدات: ' + state.folders.length);
</script>
</body>
</html>
