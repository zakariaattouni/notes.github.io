<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Smart Note Pro | حفظ تلقائي بالكامل</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100vw; }
    body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; transition: background 0.3s; }
    .dark { background: #0f172a; color: #f1f5f9; }
    .dark .bg-white { background: #1e293b; }
    .glass-header { background: rgba(255,255,255,0.75); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(0,0,0,0.04); }
    .dark .glass-header { background: rgba(30,41,59,0.8); border-color: rgba(255,255,255,0.05); }
    .sidebar { height: calc(100vh - 70px); overflow-y: auto; }
    .note-card { transition: 0.3s; border: 1px solid transparent; }
    .note-card:hover { transform: translateY(-4px); border-color: #2563eb; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
    .editor-input { background: transparent; border: none; outline: none; width: 100%; }
    .editor-title { font-size: 2rem; font-weight: 800; }
    .editor-content { font-size: 1.15rem; line-height: 1.8; min-height: 300px; resize: none; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 28px; border-radius: 14px; font-weight: bold; display: none; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
    .toast-success { background: #10b981; color: white; }
    .toast-error { background: #ef4444; color: white; }
    .toast-info { background: #3b82f6; color: white; }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .save-indicator { font-size: 0.7rem; background: #10b981; color: white; padding: 0.2rem 0.8rem; border-radius: 100px; display: none; font-weight: 700; }
    .save-indicator.show { display: inline-block; }
    .status-badge { font-size: 0.6rem; padding: 0.2rem 0.7rem; border-radius: 100px; font-weight: 600; display: inline-flex; align-items: center; gap: 0.3rem; background: #dcfce7; color: #15803d; }
    .dark .status-badge { background: #064e3b; color: #86efac; }
    .status-badge.off { background: #fef3c7; color: #b45309; }
    .dark .status-badge.off { background: #78350f; color: #fcd34d; }
    .header-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: 0.2s; background: transparent; color: #475569; font-size: 1.1rem; border: none; cursor: pointer; }
    .dark .header-btn { color: #cbd5e1; }
    .header-btn:hover { background: rgba(37,99,235,0.08); color: #2563eb; }
    .lang-select-group { display: flex; align-items: center; gap: 0.5rem; background: #f8fafc; padding: 0.25rem 0.5rem; border-radius: 12px; border: 1px solid #e2e8f0; }
    .dark .lang-select-group { background: #1e293b; border-color: #334155; }
    .lang-select-group select { background: transparent; border: none; outline: none; font-size: 0.7rem; font-weight: 700; color: #1e293b; padding: 0.25rem 0.5rem; cursor: pointer; }
    .dark .lang-select-group select { color: #f1f5f9; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    @media (max-width: 1024px) { .sidebar-mobile-active { transform: translateX(0) !important; display: flex !important; position: fixed !important; right: 0 !important; top: 70px !important; z-index: 40 !important; width: 280px !important; max-width: 85vw !important; height: calc(100vh - 70px) !important; box-shadow: -8px 0 30px rgba(0,0,0,0.15) !important; border-radius: 0 0 0 2rem !important; } .sidebar-hidden { transform: translateX(100%) !important; display: none !important; } }
    @media (max-width: 480px) { .editor-title { font-size: 1.5rem !important; } .editor-content { font-size: 1rem !important; min-height: 200px !important; } }
    #dropZone { border: 3px dashed #94a3b8; border-radius: 20px; padding: 40px; text-align: center; transition: 0.3s; cursor: pointer; }
    #dropZone.drag-over { border-color: #2563eb; background: rgba(37,99,235,0.05); }
    .copy-code-btn { background: #8b5cf6 !important; color: white !important; }
    .copy-code-btn:hover { background: #7c3aed !important; }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>

  <!-- HEADER -->
  <header class="glass-header sticky top-0 z-50">
    <div class="flex items-center justify-between h-[70px] px-4 md:px-6">
      <div class="flex items-center gap-3">

            </div>
            <span class="lang-arrow text-slate-400 text-xs">⟶</span>
            <div class="lang-select-group">
              <span class="lang-flag" id="toFlag">🇬🇧</span>
              <select id="toLang" class="text-xs"><option value="الإنجليزية">🇬🇧 الإنجليزية</option><option value="العربية">🇦🇪 العربية</option><option value="الفرنسية">🇫🇷 الفرنسية</option><option value="الإسبانية">🇪🇸 الإسبانية</option><option value="الألمانية">🇩🇪 الألمانية</option><option value="الإيطالية">🇮🇹 الإيطالية</option><option value="البرتغالية">🇵🇹 البرتغالية</option><option value="الروسية">🇷🇺 الروسية</option><option value="الصينية">🇨🇳 الصينية</option><option value="اليابانية">🇯🇵 اليابانية</option><option value="الكورية">🇰🇷 الكورية</option><option value="الهندية">🇮🇳 الهندية</option><option value="التركية">🇹🇷 التركية</option><option value="الفارسية">🇮🇷 الفارسية</option><option value="الأردية">🇵🇰 الأردية</option><option value="السواحلية">🇰🇪 السواحلية</option></select>

              <i class="fas fa-language"></i> <span class="hidden xs:inline">ترجمة</span><span class="xs:hidden">ترجم</span>

  <!-- AI LOADER -->
  <div id="aiLoader" class="fixed inset-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md hidden z-[100] flex flex-col items-center justify-center">
    <div class="loading-spinner"></div>
    <p id="aiLoaderText" class="mt-6 font-black text-blue-600 animate-pulse tracking-widest uppercase text-sm text-center px-4">⏳ جاري الاتصال بالذكاء الاصطناعي...</p>
  </div>

  <script>
    // ============================================================
    //  التخزين المتقدم: IndexedDB + localStorage + تنزيل تلقائي
    // ============================================================
    const DB_NAME = 'SmartNoteDB';
    const STORE_NAME = 'notes';
    const DB_VERSION = 1;
    let db = null;

    // فتح IndexedDB
    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function saveStateToDB(data) {
      if (!db) db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put({ id: 'main', data });
        tx.oncomplete = () => res();
        tx.onerror = () => rej(tx.error);
      });
    }

    async function loadStateFromDB() {
      if (!db) db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const get = store.get('main');
        get.onsuccess = () => res(get.result?.data || null);
        get.onerror = () => rej(get.error);
      });
    }

    // ============================================================
    //  الحالة الأساسية
    // ============================================================
    let state = {
      folders: [{ id: 'root', name: 'الملاحظات العامة', notes: [] }],
      activeFolderId: 'root',
      darkMode: false,
      encryptedApiKey: ''
    };
    let currentNoteId = null;
    let backupTimeout = null;
    let saveTimeout = null;

    // تهيئة الحالة
    async function initState() {
      // 1- من IndexedDB
      try {
        const dbData = await loadStateFromDB();
        if (dbData && dbData.folders && dbData.folders.length > 0) {
          state = dbData;
          console.log('✅ استُعيد من IndexedDB');
          return;
        }
      } catch (e) { console.warn('⚠️ فشل IndexedDB', e); }

      // 2- من localStorage
      try {
        const saved = localStorage.getItem('smart_note_pro_v3');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.folders && parsed.folders.length > 0) {
            state = parsed;
            await saveStateToDB(state);
            console.log('✅ استُعيد من localStorage ونُقل إلى IndexedDB');
            return;
          }
        }
      } catch (e) {}

      // 3- بيانات افتراضية
      state = {
        folders: [{ id: 'root', name: 'الملاحظات العامة', notes: [] }],
        activeFolderId: 'root',
        darkMode: false,
        encryptedApiKey: ''
      };
      await saveStateToDB(state);
      console.log('📝 بيانات جديدة');
    }

    // الحفظ الشامل
    async function saveAll(silent = false) {
      await saveStateToDB(state);
      localStorage.setItem('smart_note_pro_v3', JSON.stringify(state));
      if (!silent) {
        const ind = document.getElementById('saveIndicator');
        ind.classList.add('show');
        clearTimeout(ind._timeout);
        ind._timeout = setTimeout(() => ind.classList.remove('show'), 2000);
      }
      // نسخ احتياطي تلقائي (تنزيل بعد 3 ثوانٍ)
      clearTimeout(backupTimeout);
      backupTimeout = setTimeout(autoBackup, 3000);
      updateUI();
      updateConnectionStatus();
    }

    // النسخ الاحتياطي التلقائي (تنزيل ملف)
    function autoBackup() {
      try {
        const data = { folders: state.folders, exportedAt: new Date().toISOString(), version: '4.0' };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `smart_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        console.log('📥 تم تنزيل النسخ الاحتياطي التلقائي');
      } catch (e) { console.warn('⚠️ فشل التنزيل التلقائي', e); }
    }

    // استيراد البيانات (يدوياً أو تلقائياً)
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!imported.folders || !Array.isArray(imported.folders) || imported.folders.length === 0) {
            showToast('⚠️ ملف غير صالح', 'error');
            return;
          }
          if (confirm('استبدال البيانات الحالية بالبيانات المستوردة؟ (إلغاء = دمج)')) {
            state.folders = imported.folders;
            state.activeFolderId = imported.folders[0]?.id || 'root';
          } else {
            imported.folders.forEach(impFolder => {
              const existing = state.folders.find(f => f.id === impFolder.id);
              if (existing) {
                impFolder.notes.forEach(note => {
                  if (!existing.notes.find(n => n.id === note.id)) {
                    existing.notes.push(note);
                  }
                });
              } else {
                state.folders.push(impFolder);
              }
            });
          }
          await saveAll(true);
          renderAll();
          showToast('✅ تم استيراد البيانات', 'success');
          closeModal('dropZone');
        } catch (err) {
          showToast('⚠️ فشل الاستيراد: ' + err.message, 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // التحقق من وجود بيانات، وإلا عرض نافذة الاستعادة
    async function checkAndRestore() {
      try {
        const dbData = await loadStateFromDB();
        if (dbData && dbData.folders && dbData.folders.length > 0) return;
        document.getElementById('dropZone').classList.remove('hidden');
        showToast('📂 لا توجد بيانات – اختر ملف النسخ الاحتياطي', 'info');
      } catch (e) {}
    }

    // ============================================================
    //  واجهة المستخدم (كل الدوال الكاملة)
    // ============================================================
    function updateUI() {
      if (state.darkMode) document.body.classList.add('dark');
      else document.body.classList.remove('dark');
      renderFolders();
      renderNotes();
      updateFolderSelect();
      const folder = state.folders.find(f => f.id === state.activeFolderId);
      document.getElementById('currentFolderName').innerText = folder ? folder.name : 'الملاحظات العامة';
    }
    function renderAll() { updateUI(); }

    function renderFolders() {
      const list = document.getElementById('folderList');
      list.innerHTML = '';
      state.folders.forEach(f => {
        const active = f.id === state.activeFolderId;
        list.innerHTML += `
          <div onclick="switchFolder('${f.id}')" class="group flex items-center justify-between p-3.5 rounded-2xl cursor-pointer transition ${active ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500'}">
            <div class="flex items-center gap-3 overflow-hidden">
              <i class="fas ${active ? 'fa-folder-open' : 'fa-folder'} text-sm"></i>
              <span class="text-sm font-bold truncate">${sanitize(f.name)}</span>
              <span class="text-[10px] opacity-60">(${f.notes.length})</span>
            </div>
            <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition">
              <i onclick="renameFolder(event,'${f.id}')" class="fas fa-edit text-[10px] hover:text-yellow-400 cursor-pointer"></i>
              ${f.id !== 'root' ? `<i onclick="deleteFolder(event,'${f.id}')" class="fas fa-trash-alt text-[10px] hover:text-red-400 cursor-pointer"></i>` : ''}
            </div>
          </div>
        `;
      });
    }

    function renderNotes(filter = '') {
      const grid = document.getElementById('notesGrid');
      const folder = state.folders.find(f => f.id === state.activeFolderId);
      if (!folder) { grid.innerHTML = ''; return; }
      const filtered = folder.notes.filter(n =>
        n.title.toLowerCase().includes(filter.toLowerCase()) ||
        n.content.toLowerCase().includes(filter.toLowerCase())
      );
      document.getElementById('stats').innerText = `${filtered.length} ملاحظة`;
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-20"><i class="fas fa-inbox text-6xl text-slate-300 dark:text-slate-600 mb-4"></i><p class="text-slate-400">لا توجد ملاحظات</p></div>`;
        return;
      }
      grid.innerHTML = filtered.map(n => `
        <div onclick="editNote('${n.id}')" class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm note-card cursor-pointer relative group border border-slate-100 dark:border-slate-700">
          <div class="h-2 w-12 bg-blue-100 dark:bg-blue-900/30 rounded-full mb-4"></div>
          <h3 class="font-black text-xl mb-3 line-clamp-2">${sanitize(n.title)}</h3>
          <p class="text-slate-500 dark:text-slate-400 text-sm line-clamp-3">${sanitize(n.content || '...')}</p>
          <div class="flex justify-between items-center pt-4 border-t dark:border-slate-700/50 mt-4">
            <span class="text-[10px] font-black text-slate-400">${sanitize(n.date)}</span>
            <button onclick="deleteNote(event,'${n.id}')" class="w-8 h-8 flex items-center justify-center rounded-full bg-red-50 dark:bg-red-900/20 text-red-500 opacity-0 group-hover:opacity-100 hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash-alt text-xs"></i></button>
          </div>
        </div>
      `).join('');
    }

    function updateFolderSelect() {
      const sel = document.getElementById('editorFolderSelect');
      sel.innerHTML = state.folders.map(f =>
        `<option value="${f.id}" ${f.id === state.activeFolderId ? 'selected' : ''}>${sanitize(f.name)}</option>`
      ).join('');
    }

    function sanitize(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d
        .innerHTML; }
    function switchFolder(id) { state.activeFolderId = id; saveAll(true); renderAll(); if (window.innerWidth < 1024)
        toggleSidebar(); }
    function toggleSidebar() { const s = document.getElementById('sidebar'); s.classList.toggle('sidebar-mobile-active');
      s.classList.toggle('sidebar-hidden'); }

    function createFolder() {
      const name = prompt('اسم المجلد الجديد:');
      if (!name) return;
      const clean = name.trim().slice(0, 50);
      if (!clean) return;
      state.folders.push({ id: 'f-' + Date.now(), name: clean, notes: [] });
      saveAll();
      renderAll();
    }

    function renameFolder(e, id) {
      e.stopPropagation();
      const f = state.folders.find(f => f.id === id);
      if (!f) return;
      const newName = prompt('تعديل اسم المجلد:', f.name);
      if (newName) { f.name = newName.trim().slice(0, 50);
        saveAll();
        renderAll(); }
    }

    function deleteFolder(e, id) {
      e.stopPropagation();
      if (!confirm('سيتم حذف المجلد ومحتوياته بالكامل؟')) return;
      state.folders = state.folders.filter(f => f.id !== id);
      if (state.activeFolderId === id) state.activeFolderId = 'root';
      saveAll();
      renderAll();
    }

    function newNote() {
      currentNoteId = null;
      document.getElementById('editTitle').value = '';
      document.getElementById('editContent').value = '';
      document.getElementById('editorFolderSelect').value = state.activeFolderId;
      updateStats();
      document.getElementById('editorModal').classList.remove('hidden');
    }

    function editNote(id) {
      const folder = state.folders.find(f => f.id === state.activeFolderId);
      if (!folder) return;
      const note = folder.notes.find(n => n.id === id);
      if (!note) return;
      currentNoteId = id;
      document.getElementById('editTitle').value = note.title;
      document.getElementById('editContent').value = note.content;
      document.getElementById('editorFolderSelect').value = state.activeFolderId;
      updateStats();
      document.getElementById('editorModal').classList.remove('hidden');
    }

    function saveNote() {
      let title = document.getElementById('editTitle').value.trim() || 'ملاحظة بدون عنوان';
      const content = document.getElementById('editContent').value;
      const targetFolderId = document.getElementById('editorFolderSelect').value;
      const folder = state.folders.find(f => f.id === targetFolderId);
      if (!folder) return;
      if (currentNoteId) {
        const oldFolder = state.folders.find(f => f.id === state.activeFolderId);
        const idx = oldFolder.notes.findIndex(n => n.id === currentNoteId);
        if (idx === -1) return;
        const note = oldFolder.notes[idx];
        note.title = title;
        note.content = content;
        if (targetFolderId !== state.activeFolderId) {
          oldFolder.notes.splice(idx, 1);
          folder.notes.unshift(note);
        }
      } else {
        folder.notes.unshift({ id: 'n-' + Date.now(), title, content, date: new Date().toLocaleDateString('ar-EG') });
      }
      saveAll();
      closeModal('editorModal');
      renderAll();
      showToast('✅ تم حفظ الملاحظة', 'success');
    }

    function deleteNote(e, id) {
      e.stopPropagation();
      if (!confirm('حذف هذه الملاحظة نهائياً؟')) return;
      const folder = state.folders.find(f => f.id === state.activeFolderId);
      if (!folder) return;
      folder.notes = folder.notes.filter(n => n.id !== id);
      saveAll();
      renderAll();
    }

    function updateStats() {
      const text = document.getElementById('editContent').value;
      const count = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById('wordCount').innerText = count + ' كلمة';
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    function toggleDark() { state.darkMode = !state.darkMode; saveAll(true); document.body.classList.toggle('dark'); }

    function exportData() {
      const data = { folders: state.folders, exportedAt: new Date().toISOString(), version: '4.0' };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `smart_notes_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      showToast('📥 تم التصدير', 'success');
    }

    function copyEditorContent() {
      const content = document.getElementById('editContent').value;
      if (!content) return;
      if (navigator.clipboard) { navigator.clipboard.writeText(content).then(() => showToast('✅ نسخ', 'success')); } else {
        const ta = document.createElement('textarea');
        ta.value = content;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('✅ نسخ', 'success');
      }
    }

    function copyPageCode() {
      const html = document.documentElement.outerHTML;
      if (navigator.clipboard) { navigator.clipboard.writeText(html).then(() => showToast('✅ تم نسخ الكود', 'success')); } else {
        const ta = document.createElement('textarea');
        ta.value = html;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('✅ تم نسخ الكود', 'success');
      }
    }

    // ============================================================
    //  الذكاء الاصطناعي (مع الترجمة)
    // ============================================================
    function getApiKey() {
      if (!state.encryptedApiKey) { showToast('⚠️ أدخل مفتاح API في الإعدادات', 'error');
        openSettings(); return null; }
      try { const bytes = CryptoJS.AES.decrypt(state.encryptedApiKey, 'smart-note-secret-2026'); return bytes.toString(
          CryptoJS.enc.Utf8); } catch (_) { return null; }
    }

    async function testApiKey() {
      const keyInput = document.getElementById('apiKeyInput').value.trim();
      const key = keyInput || decryptData(state.encryptedApiKey);
      const statusEl = document.getElementById('testStatus');
      if (!key) { statusEl.className = 'test-status error';
        statusEl.textContent = '❌ أدخل مفتاحاً';
        statusEl.style.display = 'block'; return; }
      statusEl.className = 'test-status info';
      statusEl.textContent = '⏳ جاري الاختبار...';
      statusEl.style.display = 'block';
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
        if (res.ok) {
          statusEl.className = 'test-status success';
          statusEl.textContent = '✅ المفتاح صالح';
          showToast('✅ المفتاح صحيح', 'success');
        } else {
          statusEl.className = 'test-status error';
          statusEl.textContent = '❌ مفتاح غير صالح';
          showToast('❌ مفتاح غير صالح', 'error');
        }
      } catch (e) {
        statusEl.className = 'test-status error';
        statusEl.textContent = '⚠️ فشل الاتصال';
        showToast('⚠️ فشل الاتصال', 'error');
      }
    }

    function decryptData(encrypted) {
      try { const bytes = CryptoJS.AES.decrypt(encrypted, 'smart-note-secret-2026'); return bytes.toString(CryptoJS.enc
          .Utf8); } catch (_) { return null; }
    }

    async function getFastestModel(apiKey) {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        const models = data.models || [];
        const supported = models.filter(m => m.supportedGenerationMethods?.includes('generateContent'));
        const pref = ['gemini-2.0-flash-lite', 'gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-flash'];
        for (const p of pref) { const found = supported.find(m => m.name.includes(p)); if (found) return found.name; }
        return supported.length ? supported[0].name : 'models/gemini-pro';
      } catch (_) { return 'models/gemini-pro'; }
    }

    async function aiProcess(type) {
      const loader = document.getElementById('aiLoader');
      const loaderText = document.getElementById('aiLoaderText');
      loader.classList.remove('hidden');
      try {
        const apiKey = getApiKey();
        if (!apiKey) { loader.classList.add('hidden'); return; }
        const content = document.getElementById('editContent').value;
        if (!content) { showToast('⚠️ اكتب نصاً أولاً', 'error');
          loader.classList.add('hidden'); return; }
        let prompt = '';
        if (type === 'summarize') prompt = 'لخص النص التالي بنقاط مختصرة:';
        else if (type === 'improve') prompt = 'أعد صياغة النص بأسلوب بليغ ومنظم:';
        else if (type === 'translate') {
          const from = document.getElementById('fromLang').value;
          const to = document.getElementById('toLang').value;
          prompt = `ترجم النص من ${from} إلى ${to} بدقة:`;
        }
        const model = await getFastestModel(apiKey);
        loaderText.innerText = `⏳ جاري باستخدام ${model.split('/').pop()}...`;
        const url = `https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${apiKey}`;
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt + '\n\n' + content }] }] })
        });
        const data = await res.json();
        const result = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        loader.classList.add('hidden');
        if (result && confirm('✅ تم! هل تريد استبدال النص؟')) {
          document.getElementById('editContent').value = result;
          updateStats();
          showToast('✅ تم التطبيق', 'success');
        } else showToast('تم الإلغاء', 'info');
      } catch (e) {
        loader.classList.add('hidden');
        showToast('⚠️ فشل: ' + e.message, 'error');
      }
    }

    // ============================================================
    //  الإعدادات
    // ============================================================
    function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }

    function saveKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key || key.length < 10) { showToast('⚠️ مفتاح غير صالح', 'error'); return; }
      state.encryptedApiKey = CryptoJS.AES.encrypt(key, 'smart-note-secret-2026').toString();
      saveAll();
      showToast('✅ تم حفظ المفتاح', 'success');
      closeModal('settingsModal');
    }

    function clearKey() {
      if (!confirm('حذف المفتاح المشفر؟')) return;
      state.encryptedApiKey = '';
      saveAll();
      document.getElementById('apiKeyInput').value = '';
      showToast('🗑️ تم الحذف', 'info');
      closeModal('settingsModal');
    }

    function updateConnectionStatus() {
      const st = document.getElementById('connectionStatus');
      if (state.encryptedApiKey) { st.className = 'status-badge';
        st.innerHTML = '<i class="fas fa-circle" style="font-size:0.35rem;"></i> آمن'; } else { st.className =
          'status-badge off';
        st.innerHTML = '<i class="fas fa-circle" style="font-size:0.35rem;"></i> غير مشفر'; }
    }

    // ============================================================
    //  Toast
    // ============================================================
    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.className = 'toast toast-' + type;
      t.textContent = msg;
      t.style.display = 'block';
      clearTimeout(t._t);
      t._t = setTimeout(() => t.style.display = 'none', 4000);
    }

    // ============================================================
    //  بدء التشغيل
    // ============================================================
    (async function boot() {
      await initState();
      await checkAndRestore();
      renderAll();
      updateConnectionStatus();
      console.log('🚀 Smart Note Pro v4.0 – حفظ تلقائي بالكامل');
      console.log('📁 عدد المجلدات:', state.folders.length);

      // اختصارات لوحة المفاتيح
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 's') { e.preventDefault();
          saveNote(); }
      });

      // سحب وإفلات
      document.addEventListener('dragover', (e) => e.preventDefault());
      document.addEventListener('drop', (e) => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (files.length) {
          const input = document.getElementById('importInput');
          input.files = files;
          input.dispatchEvent(new Event('change'));
        }
      });

      // تحديث الأعلام
      document.getElementById('fromLang').addEventListener('change', updateFlags);
      document.getElementById('toLang').addEventListener('change', updateFlags);
      function updateFlags() {
        const from = document.getElementById('fromLang');
        const to = document.getElementById('toLang');
        document.getElementById('fromFlag').textContent = from.options[from.selectedIndex].text.split(' ')[0];
        document.getElementById('toFlag').textContent = to.options[to.selectedIndex].text.split(' ')[0];
      }
    })();
  </script>
</body>
</html>
